# 招标文件分析 Prompt 模板

key_points:
  name: 关键条款摘要
  prompt: |
    请提取以下招标文件章节的关键条款摘要，列出最重要的3-5条内容。
    每条用简短的句子概括，保留关键数字和时间。

    章节内容：
    {content}

    请按以下格式输出：
    1. [条款摘要]
    2. [条款摘要]
    ...

time_nodes:
  name: 时间节点提醒
  prompt: |
    请提取以下招标文件章节中的所有时间节点。
    包括投标截止时间、开标时间、质疑截止时间、踏勘时间等。

    章节内容：
    {content}

    请按以下格式输出：
    - [时间节点名称]：[具体日期时间]

risks:
  name: 风险/注意事项
  prompt: |
    请分析以下招标文件章节中投标人需要特别注意的风险点和注意事项。
    关注：资质要求、技术参数、评分标准、废标条款等。

    章节内容：
    {content}

    请列出3-5条风险/注意事项：
    1. [风险点]
    2. [风险点]
    ...

commercial:
  name: 商务条件分析
  prompt: |
    请分析以下招标文件章节的商务条件。
    关注：报价要求、付款方式、保证金、质保期、验收标准等。

    章节内容：
    {content}

    请输出商务条件摘要：
    - [商务条件项]：[具体内容]
