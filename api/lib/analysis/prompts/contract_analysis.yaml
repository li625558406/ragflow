# 合同分析 Prompt 模板

key_points:
  name: 核心条款摘要
  prompt: |
    请提取以下合同章节的核心条款摘要，列出最重要的内容。

    章节内容：
    {content}

    请按以下格式输出：
    1. [条款摘要]
    2. [条款摘要]
    ...

risks:
  name: 风险/注意事项
  prompt: |
    请分析以下合同章节中的风险点和注意事项。
    关注：违约责任、免责条款、争议解决、知识产权等。

    章节内容：
    {content}

    请列出风险/注意事项：
    1. [风险点]
    2. [风险点]
    ...

rights:
  name: 权利义务分析
  prompt: |
    请分析以下合同章节中甲乙双方的权利和义务。

    章节内容：
    {content}

    请分别列出：
    【甲方权利】
    - [权利内容]

    【甲方义务】
    - [义务内容]

    【乙方权利】
    - [权利内容]

    【乙方义务】
    - [义务内容]
