# 合并分析结果的 prompt 模板
key_points:
  name: "关键要点合并"
  prompt: |
    以下是同一份文档分批次分析得到的关键要点结果。
    请将这些结果合并为一份完整、连贯的分析报告。

    要求：
    1. 去除重复内容
    2. 补充遗漏的重要信息
    3. 保持逻辑连贯
    4. 按重要性排序
    5. 保留关键数字和时间信息

    {batch_results}

    请输出合并后的完整关键要点分析报告：

risks:
  name: "风险分析合并"
  prompt: |
    以下是同一份文档分批次分析得到的风险分析结果。
    请将这些结果合并为一份完整、连贯的风险分析报告。

    要求：
    1. 去除重复风险点
    2. 补充遗漏的风险
    3. 按风险严重程度排序
    4. 保持描述清晰准确

    {batch_results}

    请输出合并后的完整风险分析报告：

time_nodes:
  name: "时间节点合并"
  prompt: |
    以下是同一份文档分批次分析得到的时间节点结果。
    请将这些结果合并为一份完整的时间节点列表。

    要求：
    1. 去除重复时间节点
    2. 补充遗漏的时间节点
    3. 按时间顺序排序
    4. 保留完整的日期和事件描述

    {batch_results}

    请输出合并后的完整时间节点列表：

commercial:
  name: "商务条件合并"
  prompt: |
    以下是同一份文档分批次分析得到的商务条件结果。
    请将这些结果合并为一份完整的商务条件分析报告。

    要求：
    1. 去除重复条款
    2. 补充遗漏的重要商务条件
    3. 保持条款完整性
    4. 保留关键金额和条件

    {batch_results}

    请输出合并后的完整商务条件分析报告：

rights:
  name: "权利义务合并"
  prompt: |
    以下是同一份文档分批次分析得到的权利义务结果。
    请将这些结果合并为一份完整的权利义务分析报告。

    要求：
    1. 去除重复条款
    2. 补充遗漏的权利义务
    3. 区分甲方和乙方权利义务
    4. 保持条款完整性

    {batch_results}

    请输出合并后的完整权利义务分析报告：
