proxy_set_header Host $host;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
# Keep HTTP/1.1 for backend but support Cloudflare's HTTP/2
proxy_http_version 1.1;
proxy_set_header Connection "";
proxy_buffering off;
proxy_read_timeout 3600s;
proxy_send_timeout 3600s;
proxy_buffer_size 1024k;
proxy_buffers 16 1024k;
proxy_busy_buffers_size 2048k;
proxy_temp_file_write_size 2048k;

# Disable NGINX caching for SSE streams
proxy_cache off;

# Ensure proper SSE headers are passed through
proxy_hide_header X-Accel-Buffering;
proxy_hide_header X-Accel-Chunked-Transfer-Encoding;
ignore_headers X-Accel-Buffering;
ignore_headers X-Accel-Chunked-Transfer-Encoding;