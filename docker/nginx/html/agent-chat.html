<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>标书分析助手</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsencrypt@3.3.2/bin/jsencrypt.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', '-apple-system', 'PingFang SC', 'Microsoft YaHei', 'sans-serif'],
          },
        },
      },
    };
  </script>
  <style>
    body { font-family: 'Inter', -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
    .msg-content pre { background: #F8FAFC; padding: 14px 16px; border-radius: 10px; overflow-x: auto; font-size: 13px; border: 1px solid #E2E8F0; }
    .msg-content code { background: #F1F5F9; padding: 2px 6px; border-radius: 5px; font-size: 13px; }
    .msg-content pre code { background: none; padding: 0; }
    .msg-content ul, .msg-content ol { padding-left: 1.5em; margin: 0.5em 0; }
    .msg-content table { border-collapse: collapse; margin: 0.5em 0; font-size: 13px; }
    .msg-content th, .msg-content td { border: 1px solid #E2E8F0; padding: 8px 12px; }
    .msg-content th { background: #F8FAFC; font-weight: 600; color: #334155; }
    @keyframes blink { 0%,50% { opacity: 1; } 51%,100% { opacity: 0; } }
    .typing-cursor { display: inline-block; width: 2px; height: 1em; background: #94A3B8; margin-left: 2px; vertical-align: text-bottom; animation: blink 0.8s infinite; }
    .session-item:hover .delete-btn { display: flex; }
    .scrollbar-thin::-webkit-scrollbar { width: 4px; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 2px; }
    .scrollbar-thin::-webkit-scrollbar-thumb:hover { background: #94A3B8; }
    .login-bg {
      background: #FAFAF9;
      background-image:
        radial-gradient(ellipse 60% 50% at 50% 50%, rgba(99,102,241,0.05) 0%, transparent 70%);
    }
    .login-card {
      background: #FFFFFF;
      border: 1px solid #E7E5E4;
      box-shadow: 0 20px 60px -12px rgba(28,25,23,0.06);
    }
    .sidebar-bg { background: #FAFAF9; }
    .ref-card { transition: box-shadow 0.2s ease, border-color 0.2s ease; }
    .ref-card:hover { box-shadow: 0 2px 8px rgba(15,23,42,0.06); border-color: #CBD5E1; }
    .ref-list { max-height: 400px; overflow-y: auto; }
    .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .cite-badge { display: inline-flex; align-items: center; justify-content: center; min-width: 18px; height: 18px; padding: 0 4px; font-size: 11px; font-weight: 600; line-height: 1; border-radius: 5px; background: #EEF2FF; color: #6366F1; vertical-align: super; margin: 0 1px; cursor: pointer; transition: all 0.15s; }
    .cite-badge:hover { background: #6366F1; color: #fff; }
    .ref-card.highlight { border-color: #6366F1; background: #EEF2FF; }
    .input-ring { transition: box-shadow 0.2s ease, border-color 0.2s ease; }
    .input-ring:focus-within { box-shadow: 0 0 0 3px rgba(99,102,241,0.1); border-color: #A5B4FC; }
  </style>
</head>
<body class="bg-stone-50 h-screen overflow-hidden">

  <!-- Login Screen -->
  <div id="loginScreen" class="hidden fixed inset-0 login-bg flex items-center justify-center">
    <div class="login-card rounded-2xl p-10 w-full max-w-[400px]">
      <div class="text-center mb-8">
        <div class="w-14 h-14 bg-indigo-500 rounded-2xl mx-auto flex items-center justify-center mb-5">
          <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
          </svg>
        </div>
        <h1 class="text-xl font-bold text-stone-900 tracking-tight">标书分析助手</h1>
        <p class="text-stone-400 text-sm mt-1">智能招标文件分析与决策支持</p>
      </div>
      <div id="loginError" class="hidden bg-red-50 border border-red-100 text-red-600 text-sm p-3 rounded-xl mb-5"></div>
      <div class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-stone-700 mb-1.5">邮箱地址</label>
          <input id="emailInput" type="email" placeholder="请输入注册邮箱" class="w-full px-4 py-3 bg-stone-50 border border-stone-200 rounded-xl focus:ring-0 focus:outline-none focus:border-indigo-300 focus:bg-white transition text-sm placeholder:text-stone-300">
        </div>
        <div>
          <label class="block text-sm font-medium text-stone-700 mb-1.5">登录密码</label>
          <input id="passwordInput" type="password" placeholder="请输入密码" class="w-full px-4 py-3 bg-stone-50 border border-stone-200 rounded-xl focus:ring-0 focus:outline-none focus:border-indigo-300 focus:bg-white transition text-sm placeholder:text-stone-300" onkeydown="if(event.key==='Enter')doLogin()">
        </div>
        <button id="loginBtn" onclick="doLogin()" class="w-full bg-indigo-500 hover:bg-indigo-600 text-white py-3 rounded-xl transition-colors font-medium text-sm">
          登录系统
        </button>
      </div>
      <p class="text-center text-xs text-stone-300 mt-6">RAGFlow Powered</p>
    </div>
  </div>

  <!-- Chat Screen -->
  <div id="chatScreen" class="hidden h-screen flex">
    <!-- Sidebar -->
    <div class="w-[272px] sidebar-bg flex flex-col shrink-0 border-r border-stone-200/60">
      <div class="p-4">
        <button onclick="createNewSession()" class="w-full flex items-center justify-center gap-2 bg-indigo-500 hover:bg-indigo-600 text-white py-2.5 rounded-xl transition-colors font-medium text-sm">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
          新建分析
        </button>
      </div>
      <div class="px-4 pb-2">
        <div class="relative">
          <select id="agentSelector" onchange="switchAgent(this.value)" class="w-full bg-white text-stone-700 text-sm rounded-xl px-3 py-2.5 outline-none appearance-none cursor-pointer border border-stone-200 focus:border-indigo-300 transition pr-8">
            <option value="" disabled selected class="text-stone-800">选择智能体...</option>
          </select>
          <svg class="absolute right-2.5 top-1/2 -translate-y-1/2 w-4 h-4 text-stone-400 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
        </div>
      </div>
      <div class="px-5 py-2">
        <span class="text-[11px] font-semibold text-stone-400 tracking-wider uppercase">历史对话</span>
      </div>
      <div id="sessionList" class="flex-1 overflow-y-auto scrollbar-thin px-3 space-y-0.5 pb-2"></div>
      <div class="p-4 border-t border-stone-200/60">
        <div class="flex items-center gap-3">
          <div id="userAvatar" class="w-8 h-8 bg-indigo-100 text-indigo-600 rounded-lg flex items-center justify-center text-sm font-semibold"></div>
          <div class="flex-1 min-w-0">
            <div id="userName" class="text-sm font-medium text-stone-700 truncate"></div>
            <div id="userEmail" class="text-xs text-stone-400 truncate"></div>
          </div>
          <button onclick="doLogout()" class="text-stone-400 hover:text-stone-600 transition-colors p-1.5 rounded-lg hover:bg-stone-100" title="退出登录" aria-label="退出登录">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
          </button>
        </div>
      </div>
    </div>

    <!-- Main Chat Area -->
    <div class="flex-1 flex flex-col min-w-0 bg-white">
      <!-- Header -->
      <div class="h-[56px] bg-white border-b border-stone-100 flex items-center px-6 shrink-0">
        <div class="flex items-center gap-3">
          <div class="w-8 h-8 bg-indigo-50 rounded-lg flex items-center justify-center">
            <svg class="w-4 h-4 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
          </div>
          <h2 id="chatTitle" class="text-sm font-semibold text-stone-900">标书分析助手</h2>
        </div>
        <div class="ml-auto flex items-center gap-1.5">
          <span class="w-1.5 h-1.5 rounded-full bg-emerald-500"></span>
          <span class="text-xs text-stone-400">在线</span>
        </div>
      </div>

      <!-- Messages -->
      <div id="messagesArea" class="flex-1 overflow-y-auto scrollbar-thin p-6 space-y-5">
        <div class="text-center py-16">
          <div class="w-14 h-14 bg-indigo-50 rounded-2xl mx-auto flex items-center justify-center mb-4">
            <svg class="w-7 h-7 text-indigo-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
          </div>
          <p class="text-stone-400 text-sm">选择或创建一个对话开始分析</p>
          <p class="text-stone-300 text-xs mt-2">上传招标文件至知识库后，即可在此进行智能问答</p>
        </div>
      </div>

      <!-- Input Area -->
      <div class="bg-white border-t border-stone-100 p-4 shrink-0">
        <div class="flex gap-3 max-w-4xl mx-auto">
          <div class="flex-1 border border-stone-200 rounded-xl flex items-center input-ring bg-stone-50 focus-within:bg-white transition-colors">
            <input id="messageInput" type="text" placeholder="输入标书相关问题，如：采购包2的评分标准是什么？" class="flex-1 px-4 py-3 bg-transparent outline-none text-sm text-stone-900 placeholder:text-stone-300" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}">
          </div>
          <button id="sendBtn" onclick="sendMessage()" class="bg-indigo-500 hover:bg-indigo-600 text-white px-5 py-3 rounded-xl transition-colors font-medium text-sm disabled:opacity-40 disabled:cursor-not-allowed flex items-center gap-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19V5m0 0l-7 7m7-7l7 7"/></svg>
            发送
          </button>
          <button id="stopBtn" onclick="stopStreaming()" class="hidden bg-red-400 hover:bg-red-500 text-white px-4 py-3 rounded-xl transition-colors font-medium text-sm">
            停止
          </button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ===== CONFIG =====
    const CONFIG = {
      // LOCAL DEV: 指向服务器 | 部署时改回 window.location.origin
      BASE_URL: 'http://47.98.102.55',
      RSA_PUBLIC_KEY: '-----BEGIN PUBLIC KEY-----MIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEArq9XTUSeYr2+N1h3Afl/z8Dse/2yD0ZGrKwx+EEEcdsBLca9Ynmx3nIB5obmLlSfmskLpBo0UACBmB5rEjBp2Q2f3AG3Hjd4B+gNCG6BDaawuDlgANIhGnaTLrIqWrrcm4EMzJOnAOI1fgzJRsOOUEfaS318Eq9OVO3apEyCCt0lOQK6PuksduOjVxtltDav+guVAA068NrPYmRNabVKRNLJpL8w4D44sfth5RvZ3q9t+6RTArpEtc5sh5ChzvqPOzKGMXW83C95TxmXqpbK6olN4RevSfVjEAgCydH6HN6OhtOQEcnrU97r9H0iZOWwbw3pVrZiUkuRD1R56Wzs2wIDAQAB-----END PUBLIC KEY-----',
    };

    // ===== AUTH UTIL =====
    // Shares token with RAGFlow admin via localStorage on this origin
    const Auth = {
      get() { return localStorage.getItem('Authorization') || ''; },
      set(authorization, token, userInfo) {
        localStorage.setItem('Authorization', authorization);
        localStorage.setItem('token', token || '');
        localStorage.setItem('userInfo', typeof userInfo === 'string' ? userInfo : JSON.stringify(userInfo));
      },
      getUserInfo() {
        try { return JSON.parse(localStorage.getItem('userInfo') || 'null'); } catch { return null; }
      },
      clear() {
        localStorage.removeItem('Authorization');
        localStorage.removeItem('token');
        localStorage.removeItem('userInfo');
        localStorage.removeItem('ragflow_agent_id');
      },
    };

    // ===== STATE =====
    const STATE = {
      token: Auth.get(),
      userInfo: Auth.getUserInfo(),
      agents: [],
      currentAgentId: localStorage.getItem('ragflow_agent_id') || '',
      sessions: [],
      currentSessionId: null,
      messages: [],
      isStreaming: false,
      abortController: null,
      fullContent: '',
      isThinking: false,
    };

    // ===== HTTP WRAPPER (auto 401 redirect) =====
    function stripBlockChars(text) {
      return (text || '').replace(/[\u2580-\u259F\u25A0-\u25FF\u2800-\u28FF]/g, '');
    }

    function stripThinking(text) {
      if (!text) return '';
      // Remove <think ...>...</think > blocks (LLM native thinking tags, may have spaces)
      text = text.replace(/<think[^>]*>[\s\S]*?<\/think\s*>/gi, '');
      // Remove unclosed <think ...> blocks to end of string
      text = text.replace(/<think[^>]*>[\s\S]*$/gi, '');
      return text.trim();
    }

    function replaceEmoji(text) {
      return (text || '')
        .replace(/⚠️?/g, '[!]')
        .replace(/🔴/g, '[高]')
        .replace(/🟡/g, '[中]')
        .replace(/🟢/g, '[低]')
        .replace(/✅/g, '[OK]')
        .replace(/❌/g, '[X]')
        .replace(/🚨/g, '[!]')
        .replace(/📌/g, '[*]')
        .replace(/💡/g, '[提示]')
        .replace(/📋/g, '[清单]')
        .replace(/📝/g, '[笔记]')
        .replace(/🔍/g, '[查]')
        .replace(/📊/g, '[图]')
        .replace(/📅/g, '[日期]')
        .replace(/💰/g, '[费用]')
        .replace(/⏰/g, '[时间]')
        .replace(/🏢/g, '[机构]')
        .replace(/👥/g, '[人员]')
        .replace(/📄/g, '[文件]')
        .replace(/🔗/g, '[链接]')
        .replace(/#[\uFE0F\u200D]?/g, '#');
    }

    async function apiFetch(url, options = {}) {
      const resp = await fetch(url, {
        ...options,
        headers: {
          ...options.headers,
          'Authorization': STATE.token,
        },
      });
      if (resp.status === 401) {
        showToast('登录已过期，请重新登录');
        handleAuthExpired();
        throw new Error('Unauthorized');
      }
      return resp;
    }

    function handleAuthExpired() {
      STATE.token = null;
      STATE.userInfo = null;
      STATE.agents = [];
      STATE.currentAgentId = '';
      STATE.sessions = [];
      STATE.currentSessionId = null;
      STATE.messages = [];
      Auth.clear();
      showLoginScreen();
    }

    // ===== INIT =====
    function init() {
      if (STATE.token) {
        verifyToken().then(valid => {
          if (valid) {
            showChatScreen();
          } else {
            Auth.clear();
            STATE.token = '';
            STATE.userInfo = null;
            showLoginScreen();
          }
        });
      } else {
        showLoginScreen();
      }
    }

    // ===== AUTH =====
    function utf8ToBase64(str) {
      return btoa(unescape(encodeURIComponent(str)));
    }

    async function doLogin() {
      const email = document.getElementById('emailInput').value.trim();
      const password = document.getElementById('passwordInput').value;
      const errEl = document.getElementById('loginError');
      const btn = document.getElementById('loginBtn');

      if (!email || !password) {
        errEl.textContent = '请输入邮箱和密码';
        errEl.classList.remove('hidden');
        return;
      }

      btn.disabled = true;
      btn.textContent = '登录中...';
      errEl.classList.add('hidden');

      try {
        const base64Pwd = utf8ToBase64(password);
        const encryptor = new JSEncrypt();
        encryptor.setPublicKey(CONFIG.RSA_PUBLIC_KEY);
        const encryptedPwd = encryptor.encrypt(base64Pwd);
        if (!encryptedPwd) throw new Error('加密失败');

        const resp = await fetch(`${CONFIG.BASE_URL}/api/v1/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password: encryptedPwd }),
        });

        const authHeader = resp.headers.get('Authorization') || resp.headers.get('authorization');
        const result = await resp.json();
        if (result.code !== 0) throw new Error(result.message || '登录失败');

        const token = authHeader || result.data?.access_token;
        if (!token) throw new Error('登录响应中未获取到令牌');

        const authorization = token.startsWith('Bearer ') ? token : 'Bearer ' + token;
        const bareToken = result.data?.access_token || token.replace('Bearer ', '');
        STATE.token = authorization;
        STATE.userInfo = {
          id: result.data.id || result.data.user_id,
          email: result.data.email || email,
          nickname: result.data.nickname || result.data.name || email.split('@')[0],
          avatar: result.data.avatar,
        };
        Auth.set(authorization, bareToken, STATE.userInfo);
        showChatScreen();
      } catch (e) {
        errEl.textContent = e.message || '登录失败，请检查网络连接';
        errEl.classList.remove('hidden');
      } finally {
        btn.disabled = false;
        btn.textContent = '登录系统';
      }
    }

    async function verifyToken() {
      try {
        const resp = await fetch(`${CONFIG.BASE_URL}/api/v1/users/me`, {
          headers: { 'Authorization': STATE.token },
        });
        return resp.status === 200;
      } catch {
        return false;
      }
    }

    function doLogout() {
      handleAuthExpired();
    }

    // ===== AGENTS =====
    async function loadAgents() {
      try {
        const resp = await apiFetch(`${CONFIG.BASE_URL}/api/v1/agents?page_size=100`);
        const result = await resp.json();
        if (result.code !== 0) throw new Error(result.message);
        STATE.agents = (result.data && result.data.canvas) || [];
        renderAgentSelector();

        // Restore last selected or select first
        if (STATE.currentAgentId && STATE.agents.find(a => a.id === STATE.currentAgentId)) {
          document.getElementById('agentSelector').value = STATE.currentAgentId;
          loadSessions();
        } else if (STATE.agents.length > 0) {
          switchAgent(STATE.agents[0].id);
        }
      } catch (e) {
        console.error('加载智能体列表失败:', e);
        showToast('加载智能体列表失败');
      }
    }

    function renderAgentSelector() {
      const sel = document.getElementById('agentSelector');
      sel.innerHTML = '<option value="" disabled class="text-stone-800">选择智能体...</option>' +
        STATE.agents.map(a => `<option value="${a.id}" class="text-stone-800">${escapeHtml(a.title || '未命名智能体')}</option>`).join('');
    }

    function switchAgent(agentId) {
      STATE.currentAgentId = agentId;
      STATE.currentSessionId = null;
      STATE.messages = [];
      STATE.sessions = [];
      localStorage.setItem('ragflow_agent_id', agentId);
      document.getElementById('agentSelector').value = agentId;

      const agent = STATE.agents.find(a => a.id === agentId);
      document.getElementById('chatTitle').textContent = agent ? agent.title : '标书分析助手';

      renderMessages();
      loadSessions();
    }

    // ===== SESSIONS =====
    async function loadSessions() {
      try {
        let userId = STATE.userInfo && (STATE.userInfo.id || STATE.userInfo.user_id || STATE.userInfo.email);
        console.log('[loadSessions] agentId:', STATE.currentAgentId, 'userId:', userId, 'token:', STATE.token ? 'yes' : 'no');
        const resp = await apiFetch(`${CONFIG.BASE_URL}/api/v1/agents/${STATE.currentAgentId}/sessions?exp_user_id=${userId || 'current'}&orderby=update_time&desc=true`);
        const result = await resp.json();
        console.log('[loadSessions] response:', result.code, result.message, 'count:', (result.data || []).length);
        if (result.code === 0 && result.data) {
          STATE.sessions = (result.data || []).map(s => ({
            id: s.id,
            name: s.name || '新对话',
            update_time: Date.now() / 1000,
          }));
          renderSessionList();
        } else {
          console.warn('get_names API 也失败了:', result.message);
          renderSessionList();
        }
      } catch (e) {
        console.warn('加载会话列表失败:', e.message);
        renderSessionList();
      }
    }

    function switchSession(sessionId) {
      STATE.currentSessionId = sessionId;
      const session = STATE.sessions.find(s => s.id === sessionId);
      document.getElementById('chatTitle').textContent = session ? session.name : '标书分析助手';
      renderSessionList();
      loadSessionMessages(sessionId);
    }

    async function loadSessionMessages(sessionId) {
      try {
        // Show loading state
        const area = document.getElementById('messagesArea');
        area.innerHTML = '<div class="text-center py-16"><svg class="w-6 h-6 animate-spin text-stone-300 mx-auto" fill="none" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" opacity="0.2"/><path d="M12 2a10 10 0 019.95 9" stroke="currentColor" stroke-width="3" stroke-linecap="round"/></svg><p class="text-stone-400 text-sm mt-3">加载中...</p></div>';

        const resp = await apiFetch(`${CONFIG.BASE_URL}/api/v1/agents/${STATE.currentAgentId}/sessions/${sessionId}`);
        const result = await resp.json();
        if (result.code !== 0) throw new Error(result.message);
        const data = result.data;
        console.log('[loadSessionMessages] session:', sessionId, 'has message:', !!(data.message), 'msg type:', typeof data.message, 'msg is array:', Array.isArray(data.message), 'msg length:', data.message ? data.message.length : 0);

        // to_dict() returns field name 'message' (not 'messages')
        const rawMessages = data.message || [];
        const rawRef = data.reference || {};
        STATE.messages = rawMessages.map((m, idx) => ({
          role: m.role || 'assistant',
          content: stripThinking(stripBlockChars(m.content || m.answer || '')),
        }));
        console.log('[loadSessionMessages] mapped messages:', STATE.messages.length, 'rawRef type:', typeof rawRef, 'rawRef:', rawRef);

        // Attach references to assistant messages
        if (typeof rawRef === 'object' && rawRef !== null && Object.keys(rawRef).length > 0) {
          // Handle different reference structures
          let refList = [];
          if (Array.isArray(rawRef)) {
            refList = rawRef;
          } else if (rawRef.chunks && Array.isArray(rawRef.chunks)) {
            refList = [rawRef];
          } else {
            // Object with numeric keys
            refList = Object.values(rawRef);
          }

          for (let i = 0; i < STATE.messages.length && i < refList.length; i++) {
            if (i === 0 || STATE.messages[i].role !== 'user') {
              const refItem = refList[i];
              let chunks = [];
              if (refItem && refItem.chunks) {
                chunks = Array.isArray(refItem.chunks) ? refItem.chunks : [];
              }
              STATE.messages[i].references = chunks.map(c => ({
                docnm_kwd: c.docnm_kwd || c.document_name || '',
                positions: Array.isArray(c.positions) ? c.positions : (c.position_int || []),
                content_with_weight: c.content_with_weight || c.content || '',
                image_id: c.image_id || c.img_id || '',
                similarity: c.similarity || 0,
              }));
            }
          }
        }
        renderMessages();
      } catch (e) {
        console.error('加载消息失败:', e);
        showToast('加载消息失败');
        const area = document.getElementById('messagesArea');
        area.innerHTML = '<div class="text-center py-16"><p class="text-stone-400 text-sm">加载失败，请重试</p></div>';
      }
    }

    async function createNewSession() {
      STATE.currentSessionId = null;
      STATE.messages = [];
      renderMessages();
      renderSessionList();
      document.getElementById('messageInput').focus();
    }

    async function deleteSession(sessionId, event) {
      event.stopPropagation();
      if (!confirm('确认删除此对话？')) return;
      try {
        const resp = await apiFetch(`${CONFIG.BASE_URL}/api/v1/agents/${STATE.currentAgentId}/sessions/${sessionId}`, {
          method: 'DELETE',
        });
        const result = await resp.json();
        if (result.code !== 0) throw new Error(result.message);
        if (STATE.currentSessionId === sessionId) {
          STATE.currentSessionId = null;
          STATE.messages = [];
          renderMessages();
        }
        STATE.sessions = STATE.sessions.filter(s => s.id !== sessionId);
        renderSessionList();
      } catch (e) {
        showToast('删除失败: ' + e.message);
      }
    }

    // ===== CHAT =====
    async function sendMessage() {
      const input = document.getElementById('messageInput');
      const query = input.value.trim();
      if (!query || STATE.isStreaming) return;

      if (!STATE.currentSessionId) {
        try {
          const resp = await apiFetch(`${CONFIG.BASE_URL}/api/v1/agents/${STATE.currentAgentId}/sessions`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: query.slice(0, 30) }),
          });
          const result = await resp.json();
          if (result.code !== 0) throw new Error(result.message);
          STATE.currentSessionId = result.data.id;
          STATE.sessions.unshift({ id: STATE.currentSessionId, name: query.slice(0, 30), update_time: Date.now() / 1000 });
          STATE.messages = [];
          renderSessionList();
        } catch (e) {
          showToast('创建对话失败: ' + e.message);
          return;
        }
      }

      STATE.messages.push({ role: 'user', content: query });
      input.value = '';
      renderMessages();

      STATE.isStreaming = true;
      STATE.fullContent = '';
      STATE.abortController = new AbortController();
      updateSendButton();

      STATE.messages.push({ role: 'assistant', content: '', references: [] });
      renderMessages();

      try {
        const resp = await apiFetch(`${CONFIG.BASE_URL}/api/v1/agents/chat/completion`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            agent_id: STATE.currentAgentId,
            query: query,
            session_id: STATE.currentSessionId,
            stream: true,
          }),
          signal: STATE.abortController.signal,
        });

        const reader = resp.body.pipeThrough(new TextDecoderStream()).getReader();
        let buffer = '';
        let receivedEnd = false;

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += value;
          const lines = buffer.split('\n');
          buffer = lines.pop() || '';

          for (const line of lines) {
            const trimmed = line.trim();
            if (!trimmed.startsWith('data:')) continue;
            const content = trimmed.slice(5).trim();
            if (content === '[DONE]') continue;

            try {
              const event = JSON.parse(content);
              if (event.event === 'message' && event.data) {
                if (event.data.start_to_think) STATE.isThinking = true;
                const raw = event.data.content || '';
                if (!STATE.isThinking) {
                  STATE.fullContent += replaceEmoji(stripBlockChars(raw));
                  updateStreamingMessage(STATE.fullContent);
                }
                if (/<think[^>]*>/i.test(raw)) STATE.isThinking = true;
                if (/<\/think\s*>/i.test(raw)) STATE.isThinking = false;
                if (event.data.end_to_think) STATE.isThinking = false;
              }
              if (event.event === 'message_end' && event.data) {
                STATE.isThinking = false;
                receivedEnd = true;
                const ref = event.data.reference;
                if (ref && ref.chunks) {
                  STATE.messages[STATE.messages.length - 1].references = Object.values(ref.chunks);
                }
              }
            } catch (e) { /* skip */ }
          }
        }

        STATE.messages[STATE.messages.length - 1].content = replaceEmoji(stripBlockChars(STATE.fullContent));
        STATE.isStreaming = false;
        updateSendButton();
        renderMessages();
        loadSessions();
      } catch (e) {
        if (e.name === 'AbortError') {
          STATE.messages[STATE.messages.length - 1].content = replaceEmoji(stripBlockChars(STATE.fullContent)) || '(已停止)';
        } else if (receivedEnd) {
          // Agent already finished (message_end received), stream close error is harmless
          STATE.messages[STATE.messages.length - 1].content = replaceEmoji(stripBlockChars(STATE.fullContent));
        } else {
          STATE.messages[STATE.messages.length - 1].content = '请求失败: ' + e.message;
        }
        STATE.isStreaming = false;
        updateSendButton();
        renderMessages();
        loadSessions();
      }
    }

    function stopStreaming() {
      if (STATE.abortController) {
        STATE.abortController.abort();
      }
    }

    function updateStreamingMessage(content) {
      const el = document.getElementById('streamingMsg');
      if (!el) return;
      el.innerHTML = renderMarkdown(content || '') + '<span class="typing-cursor"></span>';
      scrollToBottom();
    }

    function sha1Hex(str) {
      // Pure JS SHA-1 (crypto.subtle requires HTTPS)
      const s = unescape(encodeURIComponent(str));
      const words = [];
      for (let i = 0; i < s.length * 8; i += 8) words[i >> 5] |= (s.charCodeAt(i / 8) & 0xff) << (24 - i % 32);
      words[s.length * 8 >> 5] |= 0x80 << (24 - (s.length * 8) % 32);
      words[(((s.length * 8) + 64) >> 9) << 4] = s.length * 8;
      const H = [0x67452301, 0xEFCDAB89, 0x98BADCFE, 0x10325476, 0xC3D2E1F0];
      const w = new Array(80);
      for (let i = 0; i < 16; i++) w[i] = words[i] || 0;
      for (let i = 16; i < 80; i++) { const t = w[i-3] ^ w[i-8] ^ w[i-14] ^ w[i-16]; w[i] = (t << 1) | (t >>> 31); }
      let a=H[0],b=H[1],c=H[2],d=H[3],e=H[4];
      for (let i = 0; i < 80; i++) {
        let f,k;
        if (i<20){f=(b&c)|(~b&d);k=0x5A827999;}
        else if(i<40){f=b^c^d;k=0x6ED9EBA1;}
        else if(i<60){f=(b&c)|(b&d)|(c&d);k=0x8F1BBCDC;}
        else{f=b^c^d;k=0xCA62C1D6;}
        const t=((a<<5)|(a>>>27))+f+e+k+w[i];
        e=d;d=c;c=(b<<30)|(b>>>2);b=a;a=t;
      }
      H[0]=(H[0]+a)>>>0;H[1]=(H[1]+b)>>>0;H[2]=(H[2]+c)>>>0;H[3]=(H[3]+d)>>>0;H[4]=(H[4]+e)>>>0;
      return H.map(h => h.toString(16).padStart(8,'0')).join('');
    }

    function buildRefIdMap(references) {
      const map = {};
      for (const [idx, ref] of (references || []).entries()) {
        const chunkId = ref.chunk_id || ref.id || '';
        if (chunkId) {
          const hex = sha1Hex(String(chunkId));
          let num = 0n;
          for (let i = 0; i < hex.length; i++) num = num * 16n + BigInt(parseInt(hex[i], 16));
          map[Number(num % 500n)] = idx;
        }
      }
      return map;
    }

    let _refIdMap = {};

    function renderMarkdown(text, refCount) {
      text = stripBlockChars(text);
      try {
        let html = marked.parse(text || '');
        if (refCount && refCount > 0) {
          // Match [ID:xxx] format (hash-based citation)
          html = html.replace(/\[ID:(\d+)\]/gi, (match, num) => {
            const hashId = parseInt(num);
            const idx = _refIdMap[hashId];
            if (idx !== undefined) {
              return `<a href="javascript:void(0)" class="cite-badge" onclick="scrollToRef(this, 'ref-${idx}')">${idx + 1}</a>`;
            }
            return `<span class="cite-badge" style="opacity:0.4">${num}</span>`;
          });
          // Match [N] format (positional citation)
          html = html.replace(/\[(\d+)\]/g, (match, num) => {
            const idx = parseInt(num) - 1;
            if (idx >= 0 && idx < refCount) {
              return `<a href="javascript:void(0)" class="cite-badge" onclick="scrollToRef(this, 'ref-${idx}')">${num}</a>`;
            }
            return match;
          });
        }
        return html;
      } catch (e) { return text || ''; }
    }

    function scrollToRef(badge, refId) {
      const card = document.getElementById(refId);
      if (!card) return;
      card.scrollIntoView({ behavior: 'smooth', block: 'center' });
      card.classList.add('highlight');
      setTimeout(() => card.classList.remove('highlight'), 2000);
    }

    let _currentRefList = [];

    function renderReferences(references) {
      if (!references || references.length === 0) return '';
      _currentRefList = references;
      const cards = references.map((ref, idx) => {
        const refId = 'ref-' + idx;
        const docName = ref.docnm_kwd || ref.document_name || '未知文档';
        const page = (ref.positions && ref.positions[0] && ref.positions[0][0]) ? ref.positions[0][0] : '';
        const snippet = (ref.content_with_weight || ref.content || '').slice(0, 100);
        const imageId = ref.image_id || ref.img_id || '';
        const similarity = ref.similarity ? Math.round(ref.similarity * 100) : '';
        const imgUrl = imageId ? `${CONFIG.BASE_URL}/api/v1/documents/images/${imageId}` : '';
        return `
          <div id="${refId}" class="ref-card flex gap-3 p-3 rounded-xl border border-stone-100 bg-stone-50/50 cursor-pointer" onclick="openRefDetail(${idx})">
            ${imgUrl ? `<img src="${imgUrl}" class="w-14 h-18 rounded-lg object-cover border border-stone-100 shrink-0 bg-white" loading="lazy" onerror="this.style.display='none'">` : ''}
            <div class="flex-1 min-w-0">
              <div class="flex items-center gap-2 mb-1">
                <span class="text-[11px] font-semibold text-indigo-600 bg-indigo-50 px-2 py-0.5 rounded-md">来源 ${idx + 1}</span>
                <span class="text-[11px] text-stone-400">${page ? '第' + page + '页' : ''}</span>
                ${similarity ? `<span class="text-[11px] text-stone-300">${similarity}%</span>` : ''}
              </div>
              <div class="text-xs text-stone-600 font-medium truncate">${escapeHtml(docName)}</div>
              <div class="text-xs text-stone-400 mt-1 line-clamp-2">${escapeHtml(snippet)}</div>
            </div>
          </div>`;
      }).join('');
      return `
        <div class="ref-section mt-3 border-t border-stone-100 pt-3">
          <button class="flex items-center gap-1.5 text-xs font-medium text-stone-400 hover:text-stone-600 transition-colors mb-2" onclick="this.nextElementSibling.classList.toggle('hidden');this.querySelector('.ref-arrow').classList.toggle('rotate-90')">
            <svg class="w-3 h-3 ref-arrow transition-transform ${references.length <= 3 ? 'rotate-90' : ''}" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
            引用来源 (${references.length})
          </button>
          <div class="ref-list space-y-2 ${references.length <= 3 ? '' : 'hidden'}">${cards}</div>
        </div>`;
    }

    function openRefImage(url, docName, page) {
      const overlay = document.createElement('div');
      overlay.className = 'fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex items-center justify-center p-8';
      overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
      overlay.innerHTML = `
        <div class="bg-white rounded-2xl shadow-xl max-w-3xl max-h-[90vh] overflow-hidden">
          <div class="flex items-center justify-between px-5 py-3 border-b border-stone-100">
            <span class="text-sm font-medium text-stone-700">${escapeHtml(docName)} ${page ? '- 第' + page + '页' : ''}</span>
            <button onclick="this.closest('.fixed').remove()" class="text-stone-400 hover:text-stone-600 transition-colors p-1">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
          </div>
          <div class="p-4 flex items-center justify-center bg-stone-50">
            <img src="${url}" class="max-w-full max-h-[75vh] rounded-lg border border-stone-100" loading="lazy">
          </div>
        </div>`;
      document.body.appendChild(overlay);
    }

    function openRefDetail(idx) {
      const ref = _currentRefList[idx];
      if (!ref) return;
      const docName = ref.docnm_kwd || ref.document_name || '未知文档';
      const page = (ref.positions && ref.positions[0] && ref.positions[0][0]) ? ref.positions[0][0] : '';
      const content = ref.content_with_weight || ref.content || '';
      const imageId = ref.image_id || ref.img_id || '';
      const similarity = ref.similarity ? Math.round(ref.similarity * 100) : '';
      const imgUrl = imageId ? `${CONFIG.BASE_URL}/api/v1/documents/images/${imageId}` : '';

      const overlay = document.createElement('div');
      overlay.className = 'fixed inset-0 bg-black/50 backdrop-blur-sm z-50 flex items-center justify-center p-8';
      overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
      overlay.innerHTML = `
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-2xl max-h-[85vh] overflow-hidden flex flex-col">
          <div class="flex items-center justify-between px-5 py-3 border-b border-stone-100 shrink-0">
            <div class="flex items-center gap-2 min-w-0">
              <span class="text-sm font-medium text-stone-700 truncate">${escapeHtml(docName)}</span>
              ${page ? `<span class="text-xs text-stone-400 shrink-0">第${page}页</span>` : ''}
              ${similarity ? `<span class="text-xs text-stone-300 shrink-0">${similarity}%</span>` : ''}
            </div>
            <button onclick="this.closest('.fixed').remove()" class="text-stone-400 hover:text-stone-600 transition-colors p-1 shrink-0">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
          </div>
          <div class="flex-1 overflow-y-auto p-5">
            ${imgUrl ? `<img src="${imgUrl}" class="max-w-full max-h-[40vh] rounded-lg border border-stone-100 mb-4" loading="lazy">` : ''}
            <pre class="whitespace-pre-wrap word-break-break-word text-sm text-stone-600 leading-relaxed m-0 font-sans">${escapeHtml(content)}</pre>
          </div>
        </div>`;
      document.body.appendChild(overlay);
    }

    function scrollToBottom() {
      const area = document.getElementById('messagesArea');
      const isNearBottom = area.scrollHeight - area.scrollTop - area.clientHeight < 150;
      if (isNearBottom) area.scrollTop = area.scrollHeight;
    }

    // ===== UI RENDERING =====
    function renderSessionList() {
      const container = document.getElementById('sessionList');
      if (STATE.sessions.length === 0) {
        container.innerHTML = '<div class="text-center text-stone-600/40 text-xs py-8">暂无对话记录</div>';
        return;
      }
      container.innerHTML = STATE.sessions.map(s => `
        <div class="session-item group flex items-center gap-2 px-3 py-2.5 rounded-xl cursor-pointer transition-colors ${s.id === STATE.currentSessionId ? 'bg-indigo-50 text-indigo-700' : 'hover:bg-stone-100 text-stone-500'}" onclick="switchSession('${s.id}')">
          <svg class="w-4 h-4 shrink-0 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/></svg>
          <span class="flex-1 text-sm truncate">${escapeHtml(s.name)}</span>
          <button class="delete-btn hidden w-6 h-6 items-center justify-center rounded-lg text-stone-300 hover:text-red-400 hover:bg-stone-100 shrink-0" onclick="deleteSession('${s.id}', event)" title="删除" aria-label="删除对话">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M6 18L18 6M6 6l12 12"/></svg>
          </button>
        </div>
      `).join('');
    }

    function renderMessages() {
      const area = document.getElementById('messagesArea');
      if (STATE.messages.length === 0) {
        area.innerHTML = '<div class="text-center py-16"><div class="w-14 h-14 bg-stone-100 rounded-2xl mx-auto flex items-center justify-center mb-4"><svg class="w-7 h-7 text-stone-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg></div><p class="text-stone-400 text-sm">选择或创建一个对话开始分析</p><p class="text-stone-300 text-xs mt-2">上传招标文件至知识库后，即可在此进行智能问答</p></div>';
        return;
      }

      // Build hash ID map for [ID:xxx] citation matching
      const lastAssistant = [...STATE.messages].reverse().find(m => m.role === 'assistant' && m.references && m.references.length > 0);
      console.log('[renderMessages] msgs:', STATE.messages.length, 'lastAssistant with refs:', !!lastAssistant, 'all refs:', STATE.messages.map(m => m.references ? m.references.length : 0));
      if (lastAssistant) {
        _refIdMap = buildRefIdMap(lastAssistant.references);
      } else {
        _refIdMap = {};
      }

      area.innerHTML = STATE.messages.map((msg, i) => {
        const isLast = i === STATE.messages.length - 1;
        const isStreaming = isLast && STATE.isStreaming;

        if (msg.role === 'user') {
          return `<div class="flex justify-end"><div class="max-w-[70%] bg-indigo-500 text-white px-4 py-3 rounded-2xl rounded-br-md text-sm leading-relaxed">${escapeHtml(msg.content)}</div></div>`;
        } else {
          const content = isStreaming ? (STATE.fullContent || '') : msg.content;
          const refs = isStreaming ? null : msg.references;
          const refCount = refs ? refs.length : 0;
          const dlBtn = (!isStreaming && content && content.length > 100) ? `<div class="mt-1 text-right"><button onclick="downloadMsg(${i})" class="text-[11px] text-stone-300 hover:text-stone-500 transition-colors" title="下载为 Markdown 文件">下载</button></div>` : '';
          return `<div class="flex justify-start"><div class="max-w-[70%]"><div class="bg-stone-50 border border-stone-100 px-4 py-3 rounded-2xl rounded-bl-md text-sm leading-relaxed msg-content"><div ${isStreaming ? 'id="streamingMsg"' : ''}>${isStreaming ? (renderMarkdown(content, refCount) + '<span class="typing-cursor"></span>') : renderMarkdown(content, refCount)}</div>${refs ? renderReferences(refs) : ''}</div>${dlBtn}</div></div>`;
        }
      }).join('');

      scrollToBottom();
    }

    function updateSendButton() {
      const sendBtn = document.getElementById('sendBtn');
      const stopBtn = document.getElementById('stopBtn');
      const input = document.getElementById('messageInput');
      if (STATE.isStreaming) {
        sendBtn.classList.add('hidden');
        stopBtn.classList.remove('hidden');
        input.disabled = true;
      } else {
        sendBtn.classList.remove('hidden');
        stopBtn.classList.add('hidden');
        input.disabled = false;
        input.focus();
      }
    }

    function showLoginScreen() {
      document.getElementById('loginScreen').classList.remove('hidden');
      document.getElementById('chatScreen').classList.add('hidden');
    }

    function showChatScreen() {
      document.getElementById('loginScreen').classList.add('hidden');
      document.getElementById('chatScreen').classList.remove('hidden');
      const info = STATE.userInfo || {};
      document.getElementById('userName').textContent = info.nickname || info.email || '';
      document.getElementById('userEmail').textContent = info.email || '';
      document.getElementById('userAvatar').textContent = (info.nickname || info.email || 'U')[0].toUpperCase();
      updateSendButton();
      loadAgents();
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function downloadMsg(idx) {
      const msg = STATE.messages[idx];
      if (!msg || !msg.content) return;
      const blob = new Blob([msg.content], { type: 'text/markdown;charset=utf-8' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      const ts = new Date().toISOString().slice(0, 19).replace(/[T:]/g, '-');
      a.href = url;
      a.download = `标书内容_${ts}.md`;
      a.click();
      URL.revokeObjectURL(url);
    }

    function showToast(message) {
      const toast = document.createElement('div');
      toast.className = 'fixed top-4 right-4 bg-indigo-500 text-white px-5 py-3 rounded-xl shadow-lg text-sm z-50 transition-all';
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 2500);
    }

    // ===== START =====
    init();
  </script>
</body>
